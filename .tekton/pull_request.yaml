apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/rhel-lightspeed/okp-mcp?rev={{ revision }}
    build.appstudio.redhat.com/commit_sha: '{{ revision }}'
    build.appstudio.redhat.com/pull_request_number: '{{ pull_request_number }}'
    build.appstudio.redhat.com/target_branch: '{{ target_branch }}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && (target_branch == "main" || target_branch.startsWith("release/"))

  creationTimestamp: null

  labels:
    appstudio.openshift.io/application: rhel-knowledge-bridge
    appstudio.openshift.io/component: rhel-knowledge-bridge
    pipelines.appstudio.openshift.io/type: build

  namespace: rhel-lightspeed-tenant
  name: rhel-knowledge-bridge-on-pull-request

spec:
  params:
    - name: git-url
      value: '{{ source_url }}'

    - name: revision
      value: '{{ revision }}'

    - name: output-image
      value: quay.io/redhat-user-workloads/rhel-lightspeed-tenant/rhel-knowledge-bridge:pr-{{ pull_request_number }}-latest

    - name: dockerfile
      value: /Containerfile-source

    - name: hermetic
      value: "false"

    # Empty prefetch-input disables Cachi2/hermeto prefetch entirely. The
    # prefetch-dependencies task keys off this input, not the hermetic flag, so
    # leaving it populated would still stamp hermeto:pip:package:binary=true
    # into the SBOM and trip Conforma's disallowed_package_attributes rule.
    - name: prefetch-input
      value: ""

    - name: image-expires-after
      value: 5d

    - name: tag-prefix
      value: pr-{{ pull_request_number }}-

  pipelineRef:
    name: pipeline-build-multiarch

  taskRunTemplate:
    serviceAccountName: build-pipeline-rhel-knowledge-bridge

  workspaces:
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
