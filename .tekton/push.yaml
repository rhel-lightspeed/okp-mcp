apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://gitlab.cee.redhat.com/rhel-lightspeed/enhanced-shell/okp-mcp/-/tree/{{ revision }}
    build.appstudio.redhat.com/commit_sha: '{{ revision }}'
    build.appstudio.redhat.com/target_branch: '{{ target_branch }}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: >-
      event == "push"
      && (
        target_branch == "main"
        || target_branch.startsWith("refs/tags/")
      )

  creationTimestamp: null

  labels:
    appstudio.openshift.io/application: okp-mcp
    appstudio.openshift.io/component: okp-mcp
    pipelines.appstudio.openshift.io/type: build

  namespace: rhel-lightspeed-tenant
  name: okp-mcp-on-push

spec:
  params:
    - name: git-url
      value: '{{ source_url }}'

    - name: revision
      value: '{{ revision }}'

    - name: output-image
      value: quay.io/redhat-user-workloads/rhel-lightspeed-tenant/okp-mcp:{{ revision }}

    - name: dockerfile
      value: /Containerfile

    - name: additional-tags
      value:
        - latest

  pipelineRef:
    name: pipeline-build-multiarch

  taskRunTemplate:
    serviceAccountName: build-pipeline-okp-mcp

  workspaces:
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
