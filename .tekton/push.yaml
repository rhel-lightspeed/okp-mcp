apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/rhel-lightspeed/okp-mcp?rev={{ revision }}
    build.appstudio.redhat.com/commit_sha: '{{ revision }}'
    build.appstudio.redhat.com/target_branch: '{{ target_branch }}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: >-
      event == "push"
      && (
        target_branch == "main"
        || target_branch.startsWith("release/")
        || target_branch.startsWith("refs/tags/")
      )

  creationTimestamp: null

  labels:
    appstudio.openshift.io/application: okp-mcp
    appstudio.openshift.io/component: okp-mcp
    pipelines.appstudio.openshift.io/type: build

  namespace: rhel-lightspeed-tenant
  name: okp-mcp-on-push

spec:
  params:
    - name: git-url
      value: '{{ source_url }}'

    - name: revision
      value: '{{ revision }}'

    - name: output-image
      value: quay.io/redhat-user-workloads/rhel-lightspeed-tenant/okp-mcp:{{ revision }}

    - name: dockerfile
      value: /Containerfile

    - name: hermetic
      value: "false"

    # Empty prefetch-input disables Cachi2/hermeto prefetch entirely. The
    # prefetch-dependencies task keys off this input, not the hermetic flag, so
    # leaving it populated would still stamp hermeto:pip:package:binary=true
    # into the SBOM and trip Conforma's disallowed_package_attributes rule.
    - name: prefetch-input
      value: ""

    - name: additional-tags
      value:
        - latest

  pipelineRef:
    name: pipeline-build-multiarch

  taskRunTemplate:
    serviceAccountName: build-pipeline-okp-mcp

  workspaces:
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
