apiVersion: tekton.dev/v1
kind: Task
metadata:
  namespace: rhel-lightspeed-tenant
  name: get-version

spec:
  description: Extract project version from pyproject.toml
  params:
    - name: source_artifact
      description: The Trusted Artifact URI pointing to the artifact with the application source code.
      type: string

  results:
    - name: version
      description: Project version (also valid as a container tag)

  volumes:
    - name: workdir
      emptyDir: {}

  stepTemplate:
    volumeMounts:
      - name: workdir
        mountPath: /var/workdir

  steps:
    - name: use-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:5307eb0dd71e493851632526497b85640efe46cf2e1934856724489260c968ae
      args:
        - use
        - $(params.source_artifact)=/var/workdir/source

    - name: extract-version
      image: registry.redhat.io/ubi10/s2i-base:latest
      workingDir: /var/workdir/source
      script: |
        #!/usr/bin/env python3
        import tomllib, pathlib
        version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
        pathlib.Path("$(results.version.path)").write_text(version)
        print(f"version={version}")
