[project]
name = "okp-mcp"
version = "0.1.0"
description = "MCP server for the Offline Knowledge Portal"
readme = "README.md"
authors = [{ name = "Major Hayden", email = "major@redhat.com" }]
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=3.1.1",
    "httpx",
    "pydantic-settings>=2.13.1",
    "rank-bm25",
    "sentence-transformers>=5.3.0",
    "stop-words>=2025.11.4",
    "torch>=2.1.0",
]

[project.scripts]
okp-mcp = "okp_mcp:main"

[build-system]
requires = ["uv_build>=0.11.1,<0.11.2"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pydantic-ai-slim[google,mcp]>=1.72.0,<2.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "pytest-randomly>=4.0.1",
    "pytest-sugar>=1.1.1",
    "pytest-xdist>=3.8.0",
    "radon>=6.0.1",
    "respx>=0.22",
    "ruff>=0.15.8",
    "ty>=0.0.26",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "functional: end-to-end tests requiring live Solr and Vertex AI credentials",
]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "S", "B", "A", "C4", "SIM"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S104"]

[tool.ty.environment]
python-version = "3.12"

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cpu" }
