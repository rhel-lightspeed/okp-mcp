# RLS Backend - RHEL Lightspeed with OKP RAG via MCP
#
# Service dependency chain:
#   okp (Solr) → okp-mcp (MCP server) → llama-stack → lightspeed-stack → nginx
#
# Start: podman compose up -d

services:

  # --------------------------------------------------------------------------
  # OKP Solr — RAG knowledge base
  # --------------------------------------------------------------------------
  # Pre-built Solr index containing RHEL documentation, errata, and CVEs.
  # The portal-rag collection is queried by the okp-mcp server for semantic
  # and hybrid search. Requires VPN to pull the image.
  okp:
    image: images.paas.redhat.com/offline-kbase/okp-rag-proto:nov20
    container_name: okp
    # No host port — Solr is only accessed by okp-mcp on the compose network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/solr/portal-rag/select?q=*:*&rows=0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # OKP MCP Server — MCP tool provider for RAG
  # --------------------------------------------------------------------------
  # Exposes three MCP tools over SSE: semantic_search, hybrid_search, and
  # explore_collection. Uses IBM Granite 30M embeddings for vector similarity.
  # Built from the okp-solr-rag-providers git submodule. First build downloads
  # the embedding model (~5 min).
  #
  # Transport is set to SSE (not HTTP) for compatibility with llama-stack's
  # MCP client, which expects an /sse endpoint.
  okp-mcp:
    build:
      context: ./okp-solr-rag-providers
      dockerfile: Containerfile
    image: okp-mcp:latest
    container_name: okp-mcp
    ports:
      - "8001:8001"
    environment:
      - SOLR_HOST=okp:8080
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
    depends_on:
      okp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.settimeout(1); s.connect((\"localhost\", 8001)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

# --------------------------------------------------------------------------
  # Llama Stack — LLM inference + MCP tool_runtime server
  # --------------------------------------------------------------------------
  # Runs in server mode with Vertex AI as the inference provider (Gemini 2.5
  # Flash). Also provides the agents API and MCP tool_runtime that routes
  # tool calls to registered MCP servers (okp-mcp). Configured via run.yaml.
  llama-stack:
    # tag: v3.2.0
    image: registry.redhat.io/rhoai/odh-llama-stack-core-rhel9@sha256:a9e415ce30b0a61ae35ef43870b03ccb193074fdbd02683757f1908343266837
    container_name: llama-stack
    ports:
      - "8321:8321"
    volumes:
      - ./run.yaml:/opt/app-root/run.yaml:ro,z
      - ./lightspeed-stack.yaml:/opt/app-root/lightspeed-stack.yaml:ro,z
      - ${GCP_CREDENTIALS_PATH}:/opt/app-root/.gcp-keys/credentials.json:ro,z
    env_file: .env
    environment:
      - RLS_BACKEND_VERSION=0.1.0
    depends_on:
      okp-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8321/v1/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------------------------
  # Lightspeed Stack — API gateway and orchestrator
  # --------------------------------------------------------------------------
  # Serves the /v1/infer endpoint (rlsapi v1 compatible). Validates
  # x-rh-identity headers, forwards LLM and tool requests to llama-stack.
  # No host port exposed — only accessible through the nginx reverse proxy.
  lightspeed-stack:
    # tag: 0.4.0
    image: registry.redhat.io/lightspeed-core/lightspeed-stack-rhel9@sha256:6e9b392c01107132e13d221ad389308a33206248f977ea52b7cddc89389ed315
    container_name: lightspeed-stack
    volumes:
      - ./run.yaml:/opt/app-root/run.yaml:ro,z
      - ./lightspeed-stack.yaml:/app-root/lightspeed-stack.yaml:ro,z
    env_file: .env
    environment:
      - RLS_BACKEND_VERSION=0.1.0
    depends_on:
      llama-stack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request, base64, json; h = {'x-rh-identity': base64.b64encode(json.dumps({'identity': {'org_id': '12345', 'type': 'User', 'internal': {'org_id': '12345'}, 'user': {'user_id': 'test-123', 'username': 'test'}}, 'entitlements': {'rhel': {'is_entitled': True}}}).encode()).decode()}; urllib.request.urlopen(urllib.request.Request('http://localhost:8080/liveness', headers=h))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------------------------
  # Nginx — simulated load balancer (3scale / Turnpike)
  # --------------------------------------------------------------------------
  # Reverse proxy that injects a hardcoded x-rh-identity header on every
  # request, simulating what 3scale/Turnpike does in production. This is
  # the only externally accessible entry point (port 8443).
  nginx:
    # tag: alpine
    image: docker.io/library/nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: nginx-lb
    ports:
      - "8443:8443"
    volumes:
      - ./dev/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
    depends_on:
      lightspeed-stack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8443/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
