            "queryValue": "",
            "refresh": 1,
            "regex": "^crc(p01|s02)ue1-prometheus$",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {
              "selected": true,
              "text": "rhel-lightspeed-prod",
              "value": "rhel-lightspeed-prod"
            },
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "namespace",
            "options": [
              {
                "selected": true,
                "text": "rhel-lightspeed-prod",
                "value": "rhel-lightspeed-prod"
