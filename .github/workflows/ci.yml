name: CI

on:
  push:
    branches:
      - main
      - release/**

    tags:
      - v*

  pull_request:
    branches:
      - main
      - release/**

permissions: read-all

jobs:
  sanity:
    name: Sanity - ${{ matrix.test.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        test:
          - name: Type
            step_name: Check types
            command: make typecheck

          - name: Lint
            step_name: Run lint
            command: make lint

          - name: Complexity
            step_name: Check complexity
            command: make radon

          - name: Manifests
            step_name: Check hermetic manifests
            command: make check-konflux-requirements

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          prune-cache: false

      - name: Install dependencies
        run: uv sync --locked

      - name: ${{ matrix.test.step_name }}
        run: ${{ matrix.test.command }}

  units:
    name: Unit - ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          prune-cache: false

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run tests
        run: make test


  build:
    name: Build

    needs:
      - sanity
      - units

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev tag
        if: github.ref == 'refs/heads/main'
        run: |
          echo "DEV_TAG=dev-$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Extract metadata
        if: github.event_name == 'push'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=${{ env.DEV_TAG }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Containerfile
          push: ${{ github.event_name == 'push' }}
          # On PRs the metadata step is skipped, so tags/labels are empty
          # (build-only, nothing to tag)
          tags: ${{ steps.meta.outputs.tags || '' }}
          labels: ${{ steps.meta.outputs.labels || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
