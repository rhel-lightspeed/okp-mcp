name: CI

on:
  push:
    branches:
      - main
      - release/**

    tags:
      - v*

  pull_request:
    branches:
      - main
      - release/**

permissions: read-all

jobs:
  sanity:
    name: Sanity - ${{ matrix.test.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        test:
          - name: Type
            step_name: Check types
            command: make typecheck

          - name: Lint
            step_name: Run lint
            command: make lint

          - name: Complexity
            step_name: Check complexity
            command: make radon

          - name: Manifests
            step_name: Check hermetic manifests
            command: make check-konflux-requirements

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: pyproject.toml

      - name: Install pdm
        run: pip install pdm

      - name: Install dependencies
        run: |
          pdm install --group dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: ${{ matrix.test.step_name }}
        run: ${{ matrix.test.command }}

  units:
    name: Unit - ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pdm
        run: pip install pdm

      - name: Install dependencies
        run: pdm install --group dev

      - name: Run tests
        run: make test


  build:
    name: Build - ${{ matrix.platform }}

    needs:
      - sanity
      - units

    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        platform:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@53851d14592bedcffcf25ea515637cff71ef929a # v3.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and load
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Containerfile
          platforms: linux/${{ matrix.platform }}
          load: true
          provenance: false
          tags: okp-mcp:test-${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container startup
        run: scripts/test-container-startup.sh okp-mcp:test-${{ matrix.platform }}
