name: CI

on:
  push:
    branches:
      - main
      - release/**

    tags:
      - v*

  pull_request:
    branches:
      - main
      - release/**

permissions: read-all

jobs:
  sanity:
    name: Sanity - ${{ matrix.test.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        test:
          - name: Type
            step_name: Check types
            command: make typecheck

          - name: Lint
            step_name: Run lint
            command: make lint

          - name: Complexity
            step_name: Check complexity
            command: make radon

          - name: Manifests
            step_name: Check hermetic manifests
            command: make check-konflux-requirements

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          prune-cache: false

      - name: Install dependencies
        run: |
          uv sync --locked
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: ${{ matrix.test.step_name }}
        run: ${{ matrix.test.command }}

  units:
    name: Unit - ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          prune-cache: false

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run tests
        run: make test


  build:
    name: Build - ${{ matrix.platform }}

    needs:
      - sanity
      - units

    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        platform:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@53851d14592bedcffcf25ea515637c74fffb14ce # v3.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and load
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Containerfile
          platforms: linux/${{ matrix.platform }}
          load: true
          tags: okp-mcp:test-${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container startup
        run: |
          docker run --rm -d -p 8000:8000 --name okp-mcp-test okp-mcp:test-${{ matrix.platform }}
          
          for i in {1..30}; do
            STATUS=$(docker inspect -f '{{.State.Health.Status}}' okp-mcp-test 2>/dev/null || echo "missing")
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy!"
              docker stop okp-mcp-test
              exit 0
            elif [ "$STATUS" = "unhealthy" ]; then
              echo "Container healthcheck failed!"
              break
            fi
            sleep 2
          done
          
          echo "Container failed to become healthy. Logs:"
          docker logs okp-mcp-test
          docker stop okp-mcp-test
          exit 1
