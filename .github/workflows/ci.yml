name: CI

on:
  push:
    branches:
      - main
      - release/**

    tags:
      - v*

  pull_request:
    branches:
      - main
      - release/**

permissions:
  contents: read

jobs:
  sanity:
    name: Sanity - ${{ matrix.test.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        test:
          - name: Type
            step_name: Check types
            command: make typecheck

          - name: Lint
            step_name: Run lint
            command: make lint

          - name: Complexity
            step_name: Check complexity
            command: make radon

          - name: Manifests
            step_name: Check hermetic manifests
            command: make check-konflux-requirements

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
          prune-cache: false

      - name: Install dependencies
        run: |
          uv sync --locked
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: ${{ matrix.test.step_name }}
        run: ${{ matrix.test.command }}

  units:
    name: Unit - ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
          prune-cache: false

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run tests
        run: make test


  build:
    name: Build - ${{ matrix.platform }}

    needs:
      - sanity
      - units

    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        platform:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and load
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Containerfile
          platforms: linux/${{ matrix.platform }}
          load: true
          provenance: false
          tags: okp-mcp:test-${{ matrix.platform }}
          build-args: BUILD_FROM_SOURCE=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container startup
        run: scripts/test-container-startup.sh okp-mcp:test-${{ matrix.platform }}
