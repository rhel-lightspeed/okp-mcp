name: Functional Tests

on:
  # Run after CI/CD passes (covers PRs and push-to-main)
  workflow_run:
    workflows: [CI/CD]
    types: [completed]

permissions: read-all

env:
  OKP_IMAGE_TAG: '1.1.9-1775158501'

jobs:
  functional:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && (
        github.event.workflow_run.event == 'push'
        || (
          github.event.workflow_run.event == 'pull_request'
          && github.event.workflow_run.pull_requests[0].draft == false
        )
      )
    steps:
      - name: Set pending commit status
        if: github.event.workflow_run.event == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.workflow_run.head_sha }} \
            -f state=pending \
            -f context="Functional Tests" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="Functional tests in progress..."

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to registry.redhat.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REGISTRY_REDHAT_IO_USERNAME }}
          password: ${{ secrets.REGISTRY_REDHAT_IO_PASSWORD }}

      - name: Cache OKP Solr image
        id: cache-image
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/okp-image.tar
          key: okp-image-${{ env.OKP_IMAGE_TAG }}

      - name: Pull and save OKP Solr image
        if: steps.cache-image.outputs.cache-hit != 'true'
        run: |
          docker pull "registry.redhat.io/offline-knowledge-portal/rhokp-rhel9:${{ env.OKP_IMAGE_TAG }}"
          docker save "registry.redhat.io/offline-knowledge-portal/rhokp-rhel9:${{ env.OKP_IMAGE_TAG }}" -o /tmp/okp-image.tar

      - name: Load cached OKP Solr image
        if: steps.cache-image.outputs.cache-hit == 'true'
        run: docker load -i /tmp/okp-image.tar

      - name: Start OKP Solr
        run: |
          docker run -d --name redhat-okp \
            -p 8983:8983 \
            -e ACCESS_KEY="${{ secrets.OKP_ACCESS_KEY }}" \
            -e SOLR_JETTY_HOST=0.0.0.0 \
            "registry.redhat.io/offline-knowledge-portal/rhokp-rhel9:${{ env.OKP_IMAGE_TAG }}"

      - name: Wait for Solr readiness
        run: |
          timeout=120
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if curl -sf http://localhost:8983/solr/portal/admin/ping > /dev/null 2>&1; then
              echo "Solr ready after ${elapsed}s"
              exit 0
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "::error::Solr failed to start within ${timeout}s"
          docker logs redhat-okp
          exit 1

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Run functional tests
        run: uv run pytest -m functional -v

      - name: Dump Solr logs on failure
        if: failure()
        run: docker logs redhat-okp

      - name: Report success
        if: success() && github.event.workflow_run.event == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.workflow_run.head_sha }} \
            -f state=success \
            -f context="Functional Tests" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="Functional tests passed"

      - name: Report failure
        if: failure() && github.event.workflow_run.event == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.workflow_run.head_sha }} \
            -f state=failure \
            -f context="Functional Tests" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="Functional tests failed"

  # When CI/CD fails, report that functional tests were skipped so the
  # commit status doesn't stay "pending" forever (or missing entirely).
  skip-report:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    if: >-
      github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.conclusion != 'success'
    steps:
      - name: Report skipped
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.workflow_run.head_sha }} \
            -f state=failure \
            -f context="Functional Tests" \
            -f description="Skipped: CI/CD did not pass"
