name: Functional Tests

on:
  # Run after CI/CD passes on main (push only, not PRs)
  workflow_run:
    workflows: [CI/CD]
    branches: [main]
    types: [completed]

permissions: read-all

env:
  OKP_IMAGE_TAG: '1.1.9-1775158501'

jobs:
  functional:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to registry.redhat.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REGISTRY_REDHAT_IO_USERNAME }}
          password: ${{ secrets.REGISTRY_REDHAT_IO_PASSWORD }}

      - name: Cache OKP Solr image
        id: cache-image
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /tmp/okp-image.tar
          key: okp-image-${{ env.OKP_IMAGE_TAG }}

      - name: Pull and save OKP Solr image
        if: steps.cache-image.outputs.cache-hit != 'true'
        run: |
          docker pull "registry.redhat.io/offline-knowledge-portal/rhokp-rhel9:${{ env.OKP_IMAGE_TAG }}"
          docker save "registry.redhat.io/offline-knowledge-portal/rhokp-rhel9:${{ env.OKP_IMAGE_TAG }}" -o /tmp/okp-image.tar

      - name: Load cached OKP Solr image
        if: steps.cache-image.outputs.cache-hit == 'true'
        run: docker load -i /tmp/okp-image.tar

      - name: Start OKP Solr
        run: |
          docker run -d --name redhat-okp \
            -p 8983:8983 \
            -e ACCESS_KEY="${{ secrets.OKP_ACCESS_KEY }}" \
            -e SOLR_JETTY_HOST=0.0.0.0 \
            "registry.redhat.io/offline-knowledge-portal/rhokp-rhel9:${{ env.OKP_IMAGE_TAG }}"

      - name: Wait for Solr readiness
        run: |
          timeout=120
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if curl -sf http://localhost:8983/solr/portal/admin/ping > /dev/null 2>&1; then
              echo "Solr ready after ${elapsed}s"
              exit 0
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "::error::Solr failed to start within ${timeout}s"
          docker logs redhat-okp
          exit 1

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Run functional tests
        run: uv run pytest -m functional -v

      - name: Dump Solr logs on failure
        if: failure()
        run: docker logs redhat-okp
