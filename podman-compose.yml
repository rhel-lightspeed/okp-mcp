services:

  # Red Hat OKP with RAG chunks (pre-release)
  # Service name kept as redhat-okp for DNS compatibility with MCP server config.
  redhat-okp:
    image: images.paas.redhat.com/offline-kbase/rhokp-rag:mar-9-2026
    container_name: redhat-okp
    ports:
      - "8983:8983"
    environment:
      ACCESS_KEY: ${OKP_ACCESS_KEY}
      SOLR_JETTY_HOST: "0.0.0.0"
    volumes:
      - redhat-okp-rag-data:/opt/solr/server/solr/portal/data
    restart: unless-stopped

  # OKP MCP Server — Solr bridge for LLM tool calls
  okp-mcp:
    build:
      context: .
      dockerfile: Containerfile
    image: okp-mcp:latest
    container_name: mcp-server
    ports:
      - "8000:8000"
    environment:
      MCP_SOLR_URL: http://redhat-okp:8983
    depends_on:
      - redhat-okp
    restart: unless-stopped

volumes:
  redhat-okp-rag-data:
