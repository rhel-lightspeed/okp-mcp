services:

  # Red Hat OKP — Offline Knowledge Portal (Solr-based documentation index)
  # Requires registry.redhat.io authentication: podman login registry.redhat.io
  redhat-okp:
    image: registry.redhat.io/offline-knowledge-portal/rhokp-rhel9:latest
    container_name: redhat-okp
    ports:
      - "8983:8983"
    environment:
      ACCESS_KEY: ${OKP_ACCESS_KEY}
      SOLR_JETTY_HOST: "0.0.0.0"
    volumes:
      - redhat-okp-data:/opt/solr/server/solr/portal/data
    restart: unless-stopped

  # Red Hat OKP with RAG chunks (pre-release)
  redhat-okp-rag:
    image: images.paas.redhat.com/offline-kbase/rhokp-rag:mar-9-2026
    container_name: redhat-okp-rag
    ports:
      - "8984:8984"
    environment:
      ACCESS_KEY: ${OKP_ACCESS_KEY}
      SOLR_JETTY_HOST: "0.0.0.0"
      SOLR_PORT_LISTEN: 8984
    volumes:
      - redhat-okp-rag-data:/opt/solr/server/solr/portal/data
    restart: unless-stopped

  # OKP MCP Server — Solr bridge for LLM tool calls
  okp-mcp:
    build:
      context: .
      dockerfile: Containerfile
    image: okp-mcp:latest
    container_name: mcp-server
    ports:
      - "8000:8000"
    environment:
      # For standard testing, use the main OKP Solr instance:
      MCP_SOLR_URL: http://redhat-okp:8983
      # For RAG testing, switch to the RAG Solr instance:
      # MCP_SOLR_URL: http://redhat-okp-rag:8984
    depends_on:
      - redhat-okp
    restart: unless-stopped

volumes:
  redhat-okp-data:
  redhat-okp-rag-data:
