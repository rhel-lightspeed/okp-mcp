upstream lightspeed {
    server lightspeed-stack:8080;
}

server {
    listen 8443;
    server_name _;

    # Simulated load balancer: injects x-rh-identity header
    # In production, 3scale/Turnpike terminates mTLS and builds this
    # from the client certificate's CN, org_id, and entitlements.
    #
    # This hardcoded identity simulates a RHEL-entitled user.
    # To change the identity, re-encode your JSON:
    #   echo -n '{"identity": {...}, "entitlements": {...}}' | base64 -w 0

    # Base64-encoded x-rh-identity payload:
    # {
    #   "identity": {
    #     "account_number": "6789",
    #     "org_id": "12345",
    #     "type": "User",
    #     "internal": {"org_id": "12345"},
    #     "user": {
    #       "user_id": "2913b290-bd18-4b1e-ad48-be2b5e08f37b",
    #       "username": "testuser",
    #       "email": "test@example.com"
    #     }
    #   },
    #   "entitlements": {
    #     "rhel": {"is_entitled": true}
    #   }
    # }
    set $rh_identity "";

    location / {
        proxy_pass http://lightspeed;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-rh-identity $rh_identity;

        # Timeouts for LLM inference (can be slow)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint (no auth needed, passes through)
    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
